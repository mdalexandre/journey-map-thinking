name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e '.[dev,yaml]'

      - name: Ruff lint
        run: ruff check journey_map/ tests/

      - name: Mypy type check
        run: mypy journey_map/ --ignore-missing-imports

      - name: pytest
        run: pytest tests/ -q --tb=short

      - name: CLI smoke test
        run: |
          echo "build a CSV ingestion pipeline" > /tmp/jm_smoke_raw.txt
          jm position --raw /tmp/jm_smoke_raw.txt --output /tmp/jm_smoke_pos.json
          jm --help

      - name: Run cli_basic example
        run: python examples/python_basic/run.py

      - name: Privacy grep (MUST be 0)
        run: |
          count=$(grep -rEi \
            "([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}|/home/[A-Za-z0-9._-]+/|/Users/[A-Za-z0-9._-]+/)" \
            journey_map/ tests/ docs/ examples/ README.md SECURITY.md PRIVACY.md CONTRIBUTING.md \
            --include="*.py" --include="*.md" --include="*.toml" \
            --include="*.yml" --include="*.yaml" --include="*.json" \
            --include="*.txt" --include="*.rst" \
            2>/dev/null | wc -l || true)
          echo "Privacy grep hits: $count"
          if [ "$count" -gt 0 ]; then
            echo "FAIL: private tokens found in published files"
            grep -rEi \
              "([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}|/home/[A-Za-z0-9._-]+/|/Users/[A-Za-z0-9._-]+/)" \
              journey_map/ tests/ docs/ examples/ README.md SECURITY.md PRIVACY.md CONTRIBUTING.md \
              --include="*.py" --include="*.md" --include="*.toml" \
              --include="*.yml" --include="*.yaml" --include="*.json" \
              --include="*.txt" --include="*.rst" || true
            exit 1
          fi

      - name: Bandit security scan (advisory)
        run: |
          pip install bandit || true
          bandit -r journey_map/ -ll || true

      - name: pip-audit (advisory)
        run: |
          pip install pip-audit || true
          pip-audit || true
